<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js"></script>
</head>

<body>

<div class="container">

    <h2>Login</h2>

    <input
        type="email"
        id="loginEmail"
        placeholder="Enter Email"
    >

    <input
        type="password"
        id="loginPassword"
        placeholder="Enter Password"
    >

    <button onclick="login()">
        Login
    </button>

</div>



</body>
</html>
